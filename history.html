<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Darts Tracker - Spielhistorie</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/storage.js"></script>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo"><img style="width: 32px; height: auto;" src="assets\icons\dart-tracker_logo.png"
                    alt="dart tracker logo"><span class="logo-text">DARTS TRACKER</span></div>
            <div class="header-menu">
                <button class="menu-toggle" onclick="toggleNav()">☰</button>
                <!-- Navigation injected by navigation-loader.js -->
            </div>
        </header>

        <!-- Mobile Menu Dropdown -->
        <div class="mobile-menu" id="mobileMenu">
            <button class="menu-item" onclick="window.location.href='index.html'">🏠 Home</button>
            <button class="menu-item" onclick="window.location.href='imprint.html'">📄 Impressum</button>
            <button class="menu-item" onclick="window.location.href='privacy.html'">🔒 Datenschutz</button>
        </div>

        <!-- PAGES CONTAINER -->
        <div style="flex: 1; overflow-y: auto;">
            <div class="page active" style="display: flex;">
                <div class="page-content" style="max-width: 800px;">
                    <h1 style="text-align: center;">Spielhistorie</h1>
                    <button class="btn btn-ghost" onclick="window.location.href='index.html'"
                        style="margin-bottom: 2rem;">← Zurück</button>
                    <div id="historyContainer"
                        style="display: flex; flex-direction: column; gap: 1rem; overflow-y: scroll;">
                        <!-- History items generated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Custom Confirm Modal System
        function showConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'custom-confirm-modal';
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.7);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 1000;
                `;

                const content = document.createElement('div');
                content.style.cssText = `
                    background: linear-gradient(135deg, #1a2849, rgba(26, 40, 73, 0.9));
                    border: 1px solid rgba(60, 130, 246, 0.3);
                    border-radius: 1rem;
                    padding: 2rem;
                    max-width: 400px;
                    width: 90%;
                    text-align: center;
                `;

                const text = document.createElement('p');
                text.style.cssText = `
                    color: #e5e7eb;
                    margin-bottom: 1.5rem;
                    font-size: 1rem;
                `;
                text.textContent = message;

                const buttonContainer = document.createElement('div');
                buttonContainer.style.cssText = `
                    display: flex;
                    gap: 1rem;
                    justify-content: center;
                `;

                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'btn btn-ghost';
                cancelBtn.textContent = 'Abbrechen';
                cancelBtn.style.flex = '1';
                cancelBtn.onclick = () => {
                    modal.remove();
                    resolve(false);
                };

                const okBtn = document.createElement('button');
                okBtn.className = 'btn btn-primary';
                okBtn.textContent = 'OK';
                okBtn.style.flex = '1';
                okBtn.onclick = () => {
                    modal.remove();
                    resolve(true);
                };

                buttonContainer.appendChild(cancelBtn);
                buttonContainer.appendChild(okBtn);
                content.appendChild(text);
                content.appendChild(buttonContainer);
                modal.appendChild(content);
                document.body.appendChild(modal);
            });
        }

        // Menu toggle functionality
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const mobileMenu = document.getElementById('mobileMenu');

            if (menuToggle) {
                menuToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    mobileMenu.classList.toggle('active');
                });
            }

            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => {
                item.addEventListener('click', () => {
                    mobileMenu.classList.remove('active');
                });
            });

            document.addEventListener('click', (e) => {
                if (mobileMenu && !mobileMenu.contains(e.target) && e.target !== menuToggle) {
                    if (mobileMenu.classList.contains('active')) {
                        mobileMenu.classList.remove('active');
                    }
                }
            });

            // Load and display history
            loadHistory();
        });

        function loadHistory() {
            const history = Storage.getAllGames();
            const container = document.getElementById('historyContainer');

            if (history.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--gray-light);">Keine Spielhistorie vorhanden.</p>';
                return;
            }

            container.innerHTML = '';
            history.reverse().forEach((game, index) => {
                const date = new Date(game.savedAt || game.date).toLocaleDateString('de-DE', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = 'flex';
                card.style.justifyContent = 'space-between';
                card.style.alignItems = 'flex-start';
                card.style.cursor = 'pointer';

                const content = document.createElement('div');
                content.style.flex = '1';
                const finishedOrder = game.finishedOrder || [];
                const playerNames = game.players && game.players.map ? game.players.map(p => p.name ? p.name : p).join(', ') : (game.players ? game.players.join(', ') : 'Unbekannt');

                content.innerHTML = `
                    <h3 style="color: var(--bright-blue); margin: 0 0 0.5rem 0; font-size: 1.1rem;">${game.title}</h3>
                    <p style="color: var(--gray-light); font-size: 0.9rem; margin: 0 0 1rem 0;">📅 ${date}</p>
                    <p style="color: var(--gray-light); font-size: 0.85rem; margin-bottom: 0.75rem;">Spieler: ${playerNames}</p>
                    <div style="border-top: 1px solid rgba(60, 130, 246, 0.2); padding-top: 0.75rem;">
                        ${finishedOrder.map((name, idx) => {
                    const isWinner = idx === 0;
                    return `
                                <p style="color: ${isWinner ? 'var(--green-success)' : 'var(--white)'}; font-size: 0.9rem; margin: 0.25rem 0; font-weight: ${isWinner ? '600' : '400'};">
                                    <strong>${idx + 1}. ${name}</strong>
                                </p>
                            `;
                }).join('')}
                    </div>
                `;

                const menuBtn = document.createElement('button');
                menuBtn.style.background = 'none';
                menuBtn.style.border = 'none';
                menuBtn.style.color = 'var(--gray-light)';
                menuBtn.style.fontSize = '1.5rem';
                menuBtn.style.cursor = 'pointer';
                menuBtn.style.padding = '0.5rem';
                menuBtn.style.marginLeft = '1rem';
                menuBtn.textContent = '⋯';
                menuBtn.onclick = (e) => {
                    e.stopPropagation();
                    showConfirm('Dieses Spiel aus der Historie löschen?').then((confirmed) => {
                        if (confirmed) {
                            Storage.deleteGame(history.length - 1 - index);
                            loadHistory();
                        }
                    });
                };

                card.appendChild(content);
                card.appendChild(menuBtn);
                container.appendChild(card);
            });
        }
    </script>
    <script src="js/navigation-loader.js"></script>
    <script src="js/common.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Darts</title>
</head>

<body>
    <div class="body">
        <div class="container">
            <h1 class="heading-1">Darts Game</h1>
        </div>

        <div class="button-bar-container">
            <div class="button-bar">

                <!-- Game Starten -->
                <div class="button" onclick="toggleGameStart()">
                    <div class="button-img">
                        <img src="assets/icons/icons8-pfeil-64.png" alt="dart - start new game">
                    </div>
                    <div>Game Starten</div>
                </div>

                <div class="button">
                    <div class="button-img">
                        <img src="assets/icons/icons8-aktivitätenverlauf-50.png" alt="dart - show history">
                    </div>
                    <div>Historie ansehen</div>
                </div>
            </div>
        </div>


        <!-- Start Game Conteinaer -->
        <div class="hidden start-game-container" id="sg-container">
            <div class="start-game">
                <h2 class="heading-2">Neues Spiel Starten</h2>
                <form action="#" method="post" class="start-game-form" id="player-form">
                    <div id="players-grid" class="players-grid">
                        <!-- Player fields will be dynamically added here -->
                    </div>

                    <button type="button" id="add-player-button" class="submit-button">Spieler hinzufügen</button>
                    <button type="submit" class="submit-button">Starten</button>
                </form>
            </div>
        </div>

        <script src="script.js"></script>
</body>

</html>

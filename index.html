<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Darts Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo"><span class="logo-icon">🎯</span><span class="logo-text">DARTS TRACKER</span></div>
            <div class="header-menu">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <nav class="header-nav" id="headerNav">
                    <!-- Navigation wird dynamisch gefüllt -->
                </nav>
            </div>
        </header>

        <!-- Mobile Menu Dropdown -->
        <div class="mobile-menu" id="mobileMenu">
            <button class="menu-item" onclick="navigateTo('home')">🏠 Home</button>
            <button class="menu-item" onclick="window.location.href='imprint.html'">📄 Impressum</button>
            <button class="menu-item" onclick="window.location.href='privacy.html'">🔒 Datenschutz</button>
        </div>

        <!-- PAGES CONTAINER -->
        <div style="flex: 1; overflow-y: auto;">

            <!-- HOME PAGE -->
            <div class="page active" id="homePage">
                <div class="page-content"
                    style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 2rem; text-align: center;">
                    <h1>Willkommen bei Darts Tracker</h1>
                    <p style="font-size: 1.1rem; color: var(--gray-light); max-width: 600px;">
                        Verfölge deine Dart-Spiele, speichere deine Ergebnisse und sehe deine Statistiken!
                    </p>
                    <div style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
                        <button class="btn btn-primary" onclick="navigateTo('setup')">
                            🎮 Neues Spiel Starten
                        </button>
                        <button class="btn btn-secondary" onclick="window.location.href='history.html'">
                            📋 Historie Ansehen
                        </button>
                    </div>
                </div>
            </div>

            <!-- SETUP PAGE -->
            <div class="page" id="setupPage">
                <div class="page-content" style="max-width: 600px;">
                    <h1 style="text-align: center;">Neues Spiel Starten</h1>

                    <form id="gameSetupForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <!-- Game Title -->
                        <div class="form-group">
                            <label for="gameTitle">Spieltitel</label>
                            <input type="text" id="gameTitle" placeholder="z.B. Friends Match" required>
                        </div>

                        <!-- Starting Points -->
                        <div class="form-group">
                            <label for="startingPoints">Startpunkte</label>
                            <select id="startingPoints" required>
                                <option value="501">501 Punkte</option>
                                <option value="301">301 Punkte</option>
                                <option value="101">101 Punkte</option>
                                <option value="custom">Selbst definieren</option>
                            </select>
                        </div>

                        <!-- Custom Points (Hidden) -->
                        <div class="form-group" id="customPointsGroup" style="display: none;">
                            <label for="customPoints">Deine Wunschpunkte</label>
                            <input type="number" id="customPoints" min="1" placeholder="z.B. 250">
                        </div>

                        <!-- Players -->
                        <div class="form-group">
                            <label>Spieler (Max. 4)</label>
                            <div id="playersContainer" style="display: flex; flex-direction: column; gap: 0.75rem;">
                                <!-- Player inputs added dynamically -->
                            </div>
                            <button type="button" class="btn btn-secondary" id="addPlayerBtn" style="margin-top: 1rem;">
                                + Spieler hinzufügen
                            </button>
                        </div>

                        <!-- Action Buttons -->
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="submit" class="btn btn-success" style="flex: 1;">Starten</button>
                            <button type="button" class="btn btn-ghost" onclick="navigateTo('home')"
                                style="flex: 1;">Abbrechen</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- GAME PAGE -->
            <div class="page" id="gamePage" style="overflow: hidden;">
                <div class="game-layout-2col">

                    <!-- MOBILE: Full width, stacked -->
                    <!-- DESKTOP: Left column -->
                    <div style="display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; padding-right: 0.5rem;"
                        class="game-col-left">
                        <!-- Current Player Header (Mobile: Top, Desktop: Right) -->
                        <div class="game-player-header"
                            style="text-align: center; padding: 1rem; background: rgba(60, 130, 246, 0.1); border: 2px solid var(--bright-blue); border-radius: 0.5rem; display: none;">
                            <p
                                style="font-size: 0.85rem; color: var(--gray-light); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 1px;">
                                Aktueller Spieler</p>
                            <h2 id="currentPlayerDisplay"
                                style="color: var(--bright-blue); margin: 0; font-size: 1.5rem;">Spielername</h2>
                        </div>

                        <!-- Players Grid (Mobile: Top, Desktop: Hidden/Moved) -->
                        <div class="game-players-grid" style="display: none;">
                            <div id="playersGrid" class="grid"
                                style="grid-template-columns: repeat(2, 1fr); gap: 0.5rem;">
                                <!-- Player cards generated by JS -->
                            </div>
                        </div>

                        <!-- Multiplier Selection -->
                        <div
                            style="display: flex; gap: 0.75rem; background: rgba(26, 40, 73, 0.4); border: 1px solid rgba(60, 130, 246, 0.2); border-radius: 0.75rem; padding: 1rem;">
                            <button type="button" class="btn multiplier-btn" data-mult="1"
                                style="flex: 1; font-size: 0.85rem; padding: 0.5rem;">Single</button>
                            <button type="button" class="btn multiplier-btn" data-mult="2"
                                style="flex: 1; font-size: 0.85rem; padding: 0.5rem;">Double</button>
                            <button type="button" class="btn multiplier-btn" data-mult="3"
                                style="flex: 1; font-size: 0.85rem; padding: 0.5rem;">Triple</button>
                        </div>

                        <!-- Dartscheibe Numbers -->
                        <div
                            style="background: rgba(26, 40, 73, 0.4); border: 1px solid rgba(60, 130, 246, 0.2); border-radius: 0.75rem; padding: 1rem;">
                            <p
                                style="font-weight: 600; color: var(--gray-light); margin-bottom: 1rem; font-size: 0.9rem;">
                                Felder (3 Würfe):</p>
                            <div id="dartBoard" class="grid grid-4"
                                style="grid-template-columns: repeat(5, 1fr); gap: 0.5rem;">
                                <!-- Dart numbers generated by JS -->
                            </div>
                        </div>

                        <!-- Selected Throws Display -->
                        <div id="selectedThrows"
                            style="background: rgba(60, 130, 246, 0.1); border: 1px solid rgba(60, 130, 246, 0.2); border-radius: 0.5rem; padding: 1rem;">
                            <div id="throwsDisplay"
                                style="display: flex; flex-wrap: wrap; gap: 0.5rem; min-height: 2rem; align-items: center;">
                            </div>
                        </div>

                        <!-- Action Buttons (Mobile: Bottom, sticky) -->
                        <div
                            style="display: flex; gap: 0.75rem; flex-wrap: wrap; background: rgba(26, 40, 73, 0.4); padding: 1rem; border-radius: 0.5rem; border: 1px solid rgba(60, 130, 246, 0.2);">
                            <button type="button" class="btn btn-success" id="confirmThrowBtn" style="flex: 1;"
                                disabled>
                                ✓ OK
                            </button>
                            <button type="button" class="btn btn-danger" onclick="endGame()" style="flex: 1;">
                                🛑 Ende
                            </button>
                        </div>

                        <!-- Message Display -->
                        <div id="messageDisplay"
                            style="text-align: center; padding: 1rem; border-radius: 0.5rem; display: none; font-weight: 600; font-size: 0.9rem;">
                        </div>
                    </div>

                    <!-- DESKTOP: Right column (Hidden on Mobile) -->
                    <div style="display: none; flex-direction: column; gap: 1rem; overflow-y: auto; padding-left: 0.5rem; border-left: 1px solid rgba(60, 130, 246, 0.2); padding-right: 0.5rem;"
                        class="game-col-right">

                        <!-- Current Player Header (Desktop) -->
                        <div
                            style="text-align: center; padding: 1.5rem; background: rgba(60, 130, 246, 0.1); border: 2px solid var(--bright-blue); border-radius: 0.5rem;">
                            <p
                                style="font-size: 0.9rem; color: var(--gray-light); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">
                                Aktueller Spieler</p>
                            <h2 id="currentPlayerDisplay2"
                                style="color: var(--bright-blue); margin: 0; font-size: 1.8rem;">Spielername</h2>
                        </div>

                        <!-- Players Grid (Desktop) -->
                        <div
                            style="background: rgba(26, 40, 73, 0.4); border: 1px solid rgba(60, 130, 246, 0.2); border-radius: 0.75rem; padding: 1rem;">
                            <p
                                style="font-weight: 600; color: var(--gray-light); margin-bottom: 1rem; font-size: 0.9rem;">
                                Spieler:</p>
                            <div id="playersGrid2" class="grid"
                                style="grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                                <!-- Player cards generated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RESULTS PAGE -->
            <div class="page" id="resultsPage">
                <div class="page-content"
                    style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 2rem; text-align: center;">
                    <h1 style="color: var(--green-success);">🏆 SPIEL BEENDET!</h1>
                    <div id="resultsList"
                        style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 600px;"></div>
                    <button class="btn btn-primary" onclick="navigateTo('home')">← Zurück zum Menü</button>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

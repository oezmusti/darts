<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Darts</title>
</head>

<body>
    <div class="body">
        <div class="container">
            <h1 class="heading-1">Darts Game</h1>
        </div>

        <div class="button-bar-container">
            <div class="button-bar">

                <!-- Game Starten -->
                <div class="button">
                    <div class="button-img">
                        <img src="assets/icons/icons8-pfeil-64.png" alt="dart - start new game">
                    </div>
                    <div>Game Starten</div>
                </div>

                <div class="button">
                    <div class="button-img">
                        <img src="assets/icons/icons8-aktivitätenverlauf-50.png" alt="dart - show history">
                    </div>
                    <div>Historie ansehen</div>
                </div>
            </div>
        </div>


        <!-- Start Game Conteinaer -->
        <div class="start-game-container" id="sg-container">
            <div class="start-game">
                <h2 class="heading-2">Neues Spiel Starten</h2>
                <form action="#" method="post" class="start-game-form">
                    <div class="sg-input-feld">
                        <label class="sg-label" for="player1">Spieler 1:</label>
                        <input class="sg-input" type="text" id="player1" name="player1" required>
                    </div>

                    <div class="sg-input-feld">
                        <label class="sg-label" for="player1">Spieler 1:</label>
                        <input class="sg-input" type="text" id="player1" name="player1" required>
                    </div>

                    <button type="submit" class="submit-button">Starten</button>
                </form>
            </div>
        </div>
</body>

</html>
